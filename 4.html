<!DOCTYPE html>
<html>
<head>
<title>Movie Merchandise Store</title>

<style>

body{
font-family:Arial;
margin:0;
background:#111;
color:white;
}

header{
background:#000;
padding:15px;
text-align:center;
}

nav a{
color:white;
margin:10px;
cursor:pointer;
text-decoration:none;
}

section{
display:none;
padding:30px;
text-align:center;
}

.products{
display:flex;
flex-wrap:wrap;
justify-content:center;
gap:20px;
}

.product{
background:#222;
padding:15px;
border-radius:10px;
width:200px;
}

.product img{
width:100%;
border-radius:8px;
}

input{
padding:8px;
margin:5px;
}

button{
padding:8px 15px;
background:red;
color:white;
border:none;
cursor:pointer;
}

</style>

</head>

<body>

<header>

<h1>🎬 Movie Merchandise Store</h1>

<nav>
<a onclick="showPage('home')">Home</a>
<a onclick="showPage('products')">Products</a>
<a onclick="showPage('cart')">Cart</a>
<a onclick="showPage('admin')">Admin</a>
</nav>

</header>

<!-- HOME -->

<section id="home">

<h2>Welcome to Movie Merchandise Store</h2>
<p>Buy Posters • T-Shirts • Action Figures</p>

</section>

<!-- PRODUCTS -->

<section id="products">

<h2>Products</h2>

<div class="products" id="productList"></div>

</section>

<!-- CART -->

<section id="cart">

<h2>Your Cart</h2>

<ul id="cartItems"></ul>

<br>

<button onclick="checkout()">Checkout</button>

</section>

<!-- ADMIN PANEL -->

<section id="admin">

<h2>Admin Panel - Upload Merchandise</h2>

<input type="text" id="name" placeholder="Product Name"><br>

<input type="number" id="price" placeholder="Price"><br>

<input type="text" id="image" placeholder="Image URL"><br>

<button onclick="addProduct()">Add Product</button>

</section>

<script>

let products = JSON.parse(localStorage.getItem("products")) || [];

let cart = JSON.parse(localStorage.getItem("cart")) || [];

function showPage(page){

document.querySelectorAll("section").forEach(s=>s.style.display="none");

document.getElementById(page).style.display="block";

if(page==="products") displayProducts();

if(page==="cart") displayCart();

}

function addProduct(){

let name=document.getElementById("name").value;

let price=document.getElementById("price").value;

let image=document.getElementById("image").value;

let product={name,price,image};

products.push(product);

localStorage.setItem("products",JSON.stringify(products));

alert("Product Added!");

displayProducts();

}

function displayProducts(){

let list=document.getElementById("productList");

list.innerHTML="";

products.forEach((p,i)=>{

list.innerHTML+=`

<div class="product">

<img src="${p.image}">

<h3>${p.name}</h3>

<p>$${p.price}</p>

<button onclick="addToCart(${i})">Add to Cart</button>

</div>

`;

});

}

function addToCart(i){

cart.push(products[i]);

localStorage.setItem("cart",JSON.stringify(cart));

alert("Added to Cart");

}

function displayCart(){

let list=document.getElementById("cartItems");

list.innerHTML="";

cart.forEach(item=>{

list.innerHTML+=`<li>${item.name} - $${item.price}</li>`;

});

}

function checkout(){

alert("Order Placed!");

cart=[];

localStorage.removeItem("cart");

displayCart();

}

showPage("home");

</script>

</body>
</html>
